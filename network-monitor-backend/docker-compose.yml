services:
  postgres:
    image: postgres:16
    container_name: network_monitor_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: network_monitor
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
    - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
